<!DOCTYPE html>
<html>
<head>
    <title>Générateur de logos BudgetOuvert</title>
</head>
<body>
    <canvas id="canvas256" width="256" height="256"></canvas>
    <canvas id="canvas512" width="512" height="512"></canvas>
    
    <script>
        function drawLogo(canvas, size) {
            const ctx = canvas.getContext('2d');
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#1e40af');
            gradient.addColorStop(1, '#3b82f6');
            
            // Background circle
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2 - size*0.015, 0, 2 * Math.PI);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.015;
            ctx.stroke();
            
            // White rectangle for content
            const rectSize = size * 0.53;
            const rectX = (size - rectSize) / 2;
            const rectY = size * 0.27;
            ctx.beginPath();
            ctx.roundRect(rectX, rectY, rectSize, rectSize * 0.74, size * 0.023);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.fill();
            
            // Chart line
            ctx.beginPath();
            ctx.strokeStyle = '#1e40af';
            ctx.lineWidth = size * 0.008;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            const chartX = rectX + rectSize * 0.11;
            const chartY = rectY + rectSize * 0.7;
            const chartWidth = rectSize * 0.88;
            const chartHeight = rectSize * 0.5;
            
            ctx.moveTo(chartX, chartY);
            ctx.lineTo(chartX + chartWidth * 0.18, chartY - chartHeight * 0.6);
            ctx.lineTo(chartX + chartWidth * 0.36, chartY - chartHeight * 0.4);
            ctx.lineTo(chartX + chartWidth * 0.55, chartY - chartHeight * 0.8);
            ctx.lineTo(chartX + chartWidth * 0.73, chartY - chartHeight * 0.65);
            ctx.stroke();
            
            // Text
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.font = `bold ${size * 0.0625}px Arial`;
            ctx.fillText('BUDGET', size/2, size * 0.74);
            ctx.font = `${size * 0.047}px Arial`;
            ctx.fillText('OUVERT', size/2, size * 0.80);
            
            // Shield icon
            const shieldX = size * 0.74;
            const shieldY = size * 0.31;
            const shieldSize = size * 0.078;
            
            ctx.beginPath();
            ctx.moveTo(shieldX, shieldY + shieldSize);
            ctx.lineTo(shieldX - shieldSize/2, shieldY);
            ctx.lineTo(shieldX, shieldY - shieldSize/3);
            ctx.lineTo(shieldX + shieldSize/2, shieldY);
            ctx.closePath();
            ctx.fillStyle = '#10b981';
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.004;
            ctx.stroke();
        }
        
        // Generate both sizes
        drawLogo(document.getElementById('canvas256'), 256);
        drawLogo(document.getElementById('canvas512'), 512);
        
        // Download links
        setTimeout(() => {
            document.getElementById('canvas256').toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'logo256.png';
                a.click();
            });
            
            document.getElementById('canvas512').toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'logo512.png';
                a.click();
            });
        }, 100);
    </script>
</body>
</html>
