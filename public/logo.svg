<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#ffffff" stroke-width="8"/>
  
  <!-- Budget icon - simplified book/chart -->
  <rect x="120" y="140" width="272" height="200" rx="12" fill="#ffffff" opacity="0.95"/>
  
  <!-- Chart lines inside -->
  <polyline points="150,280 200,220 250,240 300,180 350,200" 
            stroke="#1e40af" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Budget text -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        text-anchor="middle" fill="#ffffff">BUDGET</text>
  <text x="256" y="410" font-family="Arial, sans-serif" font-size="24" 
        text-anchor="middle" fill="#e0e7ff">OUVERT</text>
  
  <!-- Small shield icon for trust -->
  <path d="M380 160 L400 140 L420 160 L420 180 Q400 195 380 180 Z" 
        fill="#10b981" stroke="#ffffff" stroke-width="2"/>
</svg>
